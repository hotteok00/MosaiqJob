<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles/common.css">
    <style>
        .impact-page { page-break-after: always; }
        .project-page { page-break-after: always; }
        .impact-header { text-align: center; margin-bottom: 24px; }
        .keywords { display: flex; justify-content: center; gap: 12px; margin: 16px 0; }
        .keyword { background: #1a73e8; color: white; padding: 6px 16px; border-radius: 20px; font-size: 11pt; }
        .project-section { margin-bottom: 12px; }
        .project-section h3 { color: #1a73e8; }
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
        }
        .card h4 { margin-bottom: 4px; }
        .card .period { font-size: 8pt; color: #666; }
        .card .desc { font-size: 9pt; margin: 4px 0; }
    </style>
</head>
<body>
    {{ content }}
</body>
</html>
